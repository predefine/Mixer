plugins {
    id 'java'
    id 'java-library'
    id 'com.gradleup.shadow' version '8.3.10'
}

group = 'me.predefine'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    api project(':api')
    implementation "org.ow2.asm:asm:9.9.1"
}

jar {
    manifest {
        attributes 'PreMain-Class': 'me.predefine.mixer.impl.AgentMain'
    }
}